<!DOCTYPE html>
<html>
<body>

<div id="app">Loading app...</div>

<script>
const BACKEND = "https://homework--spmspy0800.replit.app"

async function start() {
    try {

        // 1. register BACKEND service worker (Scramjet lives there now)
        if ("serviceWorker" in navigator) {
            await navigator.serviceWorker.register(BACKEND + "/sw.js", {
                scope: "/"
            })

            await navigator.serviceWorker.ready
        }

        // 2. fetch backend HTML
        let html = await fetch(BACKEND + "/").then(r => r.text())

        // 3. fix asset paths
        html = html.replace(
            /<head>/i,
            `<head><base href="${BACKEND}/">`
        )

        // 4. inject backend HTML
        document.open()
        document.write(html)
        document.close()

        // 5. load backend JS entry
        const script = document.createElement("script")
        script.src = BACKEND + "/index.js"
        script.defer = true
        document.body.appendChild(script)

    } catch (err) {
        document.body.innerHTML = "Failed: " + err
    }
}

start()
</script>

</body>
</html>
