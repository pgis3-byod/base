<!DOCTYPE html>
<html>
<body>

<div id="status">Booting...</div>

<script>
(async () => {
    const status = document.getElementById("status")

    try {
        const reg = await navigator.serviceWorker.register("/browser/sw.js", {
            scope: "/browser/"
        })

        await navigator.serviceWorker.ready

        status.textContent = "SW active"

        // force activation control
        if (navigator.serviceWorker.controller === null) {
            status.textContent = "Reloading for control..."
            location.reload()
            return
        }

        status.textContent = "Ready (Scramjet runtime loaded)"
    } catch (e) {
        status.textContent = "SW failed: " + e
    }
})()
</script>

</body>
</html>
