<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Browser</title>
</head>

<body>
<div id="app">Loading... .</div>

<script>
const BACKEND = "https://homework--spmspy0800.replit.app"

async function start() {
    try {

        // ✔ MUST be Site A SW ONLY
        if ("serviceWorker" in navigator) {
            await navigator.serviceWorker.register("/browser/sw.js", {
                scope: "/browser/"
            })

            await navigator.serviceWorker.ready
        }

        // Fetch Site B frontend HTML
        const res = await fetch(BACKEND + "/")
        let html = await res.text()

        // Fix asset paths so everything resolves to Site B
        html = html.replace(
            /<head>/i,
            `<head><base href="${BACKEND}/">`
        )

        // Replace current document with fetched frontend
        document.open()
        document.write(html)
        document.close()

        // Load Site B main JS explicitly
        const script = document.createElement("script")
        script.src = BACKEND + "/index.js"
        document.body.appendChild(script)

    } catch (err) {
        document.body.innerHTML = "Failed to load app: " + err
    }
}

start()
</script>

</body>
</html>
