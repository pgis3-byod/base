<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>browser</title>
</head>

<body>
<div id="app">Loading...</div>

<script>
const BACKEND = "https://homework--spmspy0800.replit.app"

async function start() {
    try {
        // Register Site A Service Worker ONLY
        if ("serviceWorker" in navigator) {
            await navigator.serviceWorker.register("/browser/sw.js", {
                scope: "/browser/"
            })

            await navigator.serviceWorker.ready
        }

        // Fetch Site B frontend
        let html = await fetch(BACKEND + "/").then(r => r.text())

        // Fix asset paths so everything points to Site B
        html = html.replace(
            /<head>/i,
            `<head><base href="${BACKEND}/">`
        )

        document.open()
        document.write(html)
        document.close()

        // Load Site B JS entry
        const script = document.createElement("script")
        script.src = BACKEND + "/index.js"
        document.body.appendChild(script)

    } catch (err) {
        document.getElementById("app").textContent = "Failed: " + err
    }
}

start()
</script>

</body>
</html>
