<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
</head>

<body>
<div id="app">Loading...</div>

<script>
const BACKEND = "https://homework--spmspy0800.replit.app"

async function start() {
    try {

        // FORCE only Site A SW
        if ("serviceWorker" in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations()
            for (const reg of regs) {
                await reg.unregister()
            }

            await navigator.serviceWorker.register("/browser/sw.js", {
                scope: "/browser/"
            })

            await navigator.serviceWorker.ready
        }

        // Load backend HTML
        let html = await fetch(BACKEND + "/").then(r => r.text())

        // Fix asset base
        html = html.replace(
            /<head>/i,
            `<head><base href="${BACKEND}/">`
        )

        document.open()
        document.write(html)
        document.close()

        // Load backend JS explicitly
        const script = document.createElement("script")
        script.src = BACKEND + "/index.js"
        document.body.appendChild(script)

    } catch (err) {
        document.body.innerHTML = "Failed: " + err
    }
}

start()
</script>

</body>
</html>
