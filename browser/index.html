<!DOCTYPE html>
<html>
<body>

<div id="app">Loading app...</div>

<script>
const BACKEND = "https://homework--spmspy0800.replit.app"

async function start() {
    const app = document.getElementById("app")

    try {
        // 1. register SW (Scramjet stays untouched)
        if ("serviceWorker" in navigator) {
            await navigator.serviceWorker.register("/browser/sw.js", {
                scope: "/browser/"
            })

            await navigator.serviceWorker.ready
        }

        // 2. load REAL frontend HTML
        const html = await fetch(BACKEND + "/").then(r => r.text())

        // 3. replace page with backend frontend
        document.open()
        document.write(html)
        document.close()

        // 4. load frontend JS if it exists separately
        const script = document.createElement("script")
        script.src = BACKEND + "/index.js"
        document.body.appendChild(script)

    } catch (err) {
        app.textContent = "Failed to load app: " + err
    }
}

start()
</script>

</body>
</html>
