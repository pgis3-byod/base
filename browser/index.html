<!DOCTYPE html>
<html>
<body>

<div id="app">Loading...</div>

<script>
const BACKEND = "https://homework--spmspy0800.replit.app"

async function start() {
    try {

        // IMPORTANT: register Site A SW ONLY
        await navigator.serviceWorker.register("/browser/sw.js", {
            scope: "/browser/"
        })

        await navigator.serviceWorker.ready

        // fetch Site B HTML
        let html = await fetch(BACKEND + "/").then(r => r.text())

        // fix asset paths
        html = html.replace(
            /<head>/i,
            `<head><base href="${BACKEND}/">`
        )

        document.open()
        document.write(html)
        document.close()

        // load Site B JS
        const script = document.createElement("script")
        script.src = BACKEND + "/index.js"
        document.body.appendChild(script)

    } catch (err) {
        document.body.innerHTML = "Error: " + err
    }
}

start()
</script>

</body>
</html>
