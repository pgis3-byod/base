<!doctype html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>PGIS 3</title>
<link rel="icon" type="image/x-icon" href="https://i.postimg.cc/1XJnjRTF/0937a70d8c13420e9c4d8b0dc92bddaa-free-1.png">

<style>

html, body {
scroll-behavior: smooth;
text-align:center;
background-color:black;
color:whitesmoke;
}

.games{
background-color:rgba(0,0,0,0.1);
display:flex;
justify-content:center;
gap: 40px; /* used to be 20px*/
flex-wrap:wrap;
position:relative;
z-index:1;
  padding: 30px; /* remove if bad */
}

.gamediv{
width:200px;
height:170px;
background-color:rgba(0,0,0,0.3);
background-size:cover;
background-position:center;
cursor:auto;
border:1px solid #444;
border-radius:5px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
  padding: 5px; /* remove if bad */
}

  .gamediv:hover {
        
        box-shadow: 0 0 15px white;
  transition: box-shadow 0.3s;
  }
  
button{
opacity:1!important;
z-index:2;
cursor:pointer;
background-color:#444;
color:whitesmoke;
border:none;
border-radius:4px;
}

button:hover{
background-color:lightgray;
color:black;
border-radius:6px;
}

a{
  color: white;
 }

#particles-js{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index: -0 !important;
pointer-events:none;
background:transparent;
}


iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
    }
  #menu {
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.2);
    width: 80%;
    text-align: center;
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 3px;
    
   
  }
  .icon {
    height: 5px;
  }
  #home {
    text-align: left;
  }
</style>
</head>

<body>

<div id="particles-js"></div>

<div style="position:relative;z-index:1;">
<h1 class="indexRemove">PGIS 3</h1>
</div>

<div id="games">

</div>
<div id="menu"><button id="home"><img src="/assets/home.png" class="icon"></button> <button><img src="/assets/games.png" class="icon"></button></div>
<div id="bottom"></div>

<script>
  const buttons = document.querySelectorAll("button");

buttons.forEach(btn => {
  btn.addEventListener("mousemove", e => {
    const rect = btn.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const moveX = (x - rect.width / 2) * 0.3;
    const moveY = (y - rect.height / 2) * 0.3;

    btn.style.transform = `translate(${moveX}px, ${moveY}px)`;
  });

  btn.addEventListener("mouseleave", () => {
    btn.style.transform = "translate(0,0)";
  });
});
</script>
  
<script>

document.querySelectorAll("button").forEach(btn=>{
if(btn.textContent.trim()==="open"||btn.textContent.trim()==="try 8os" ||btn.textContent.trim()==="try coreus" ||btn.textContent.trim()==="try UBGdir"){
btn.style.width="120px"
}
})

</script>

<script>

const placeholder="placeholder.png"

document.querySelectorAll("img").forEach(img=>{

img.addEventListener("error",function(){
if(this.src!==placeholder){
this.src=placeholder
}
})

if(!img.getAttribute("src")){
img.src=placeholder
}

})

</script>




<script type="module" src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>

particlesJS('particles-js',{
"particles":{
"number":{"value":100,"density":{"enable":true,"value_area":800}},
"color":{"value":"#ffffff"},
"shape":{"type":"circle"},
"opacity":{"value":0.08,"random":true},
"size":{"value":3,"random":true},
"line_linked":{"enable":true,"distance":150,"color":"#ffffff","opacity":0.4,"width":1},
"move":{"enable":true,"speed":1.5,"direction":"none","straight":false,"out_mode":"out"}
},
"interactivity":{
"detect_on":"window",
"events":{"onhover":{"enable":true,"mode":"repulse"},"onclick":{"enable":false}},
"modes":{"repulse":{"distance":120,"duration":0.5}}
},
"retina_detect":true
})

</script>




</body>
</html>
