<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Firebase Chat Fixed</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: #fff;
}

#app {
  display: flex;
  height: 100vh;
}

#rooms {
  width: 260px;
  background: #1c1c1c;
  padding: 10px;
  overflow-y: auto;
}

#chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  background: #222;
  margin: 6px 0;
  padding: 8px;
  border-radius: 6px;
}

input, button {
  margin: 5px;
  padding: 8px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div id="login">
  <input id="name" placeholder="username">
  <button onclick="login()">Join</button>
</div>

<div id="app" class="hidden">

  <div id="rooms">
    <button onclick="createRoom()">+ Create Room</button>
    <div id="roomList"></div>
  </div>

  <div id="chat">
    <div id="messages"></div>
    <input id="msg" placeholder="message">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  doc,
  setDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  signInAnonymously
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* ---------------- CONFIG ---------------- */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* ---------------- STATE ---------------- */
let user = null;
let username = "";
let currentRoom = null;

/* ---------------- AUTH ---------------- */
signInAnonymously(auth).then(u => {
  user = u.user;
});

/* ---------------- LOGIN ---------------- */
window.login = async function () {
  username = document.getElementById("name").value.trim();
  if (!username) return;

  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  loadRooms();
};

/* ---------------- CREATE ROOM ---------------- */
window.createRoom = async function () {
  const name = prompt("Room name");
  if (!name) return;

  const invite = Math.random().toString(36).slice(2, 8);

  const roomRef = await addDoc(collection(db, "rooms"), {
    name,
    ownerId: user.uid,
    inviteCode: invite,
    locked: false
  });

  await setDoc(
    doc(db, "rooms", roomRef.id, "members", user.uid),
    {
      role: "owner",
      banned: false
    }
  );
};

/* ---------------- LOAD ROOMS ---------------- */
function loadRooms() {
  onSnapshot(collection(db, "rooms"), snap => {
    const list = document.getElementById("roomList");
    list.innerHTML = "";

    snap.forEach(r => {
      const d = r.data();

      const div = document.createElement("div");
      div.innerHTML = `
        <b>${d.name}</b><br>
        <small>${d.inviteCode}</small><br>
        <button onclick="joinRoom('${r.id}')">Join</button>
      `;

      list.appendChild(div);
    });
  });
}

/* ---------------- JOIN ROOM ---------------- */
window.joinRoom = async function (roomId) {
  currentRoom = roomId;

  await setDoc(
    doc(db, "rooms", roomId, "members", user.uid),
    {
      role: "user",
      banned: false
    },
    { merge: true }
  );

  listenMessages();
};

/* ---------------- MESSAGES ---------------- */
function listenMessages() {
  const q = query(
    collection(db, "rooms", currentRoom, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, snap => {
    const box = document.getElementById("messages");
    box.innerHTML = "";

    snap.forEach(m => {
      const d = m.data();

      const el = document.createElement("div");
      el.className = "msg";

      el.innerHTML = `
        <b>${d.username}</b>: ${d.text}
        <br>
        <button onclick="deleteMsg('${m.id}')">delete</button>
      `;

      box.appendChild(el);
    });
  });
}

/* ---------------- SEND MESSAGE ---------------- */
window.sendMessage = async function () {
  const text = document.getElementById("msg").value;
  if (!text.trim() || !currentRoom) return;

  await addDoc(
    collection(db, "rooms", currentRoom, "messages"),
    {
      text,
      username,
      userId: user.uid,
      createdAt: Date.now()
    }
  );

  document.getElementById("msg").value = "";
};

/* ---------------- DELETE MESSAGE ---------------- */
window.deleteMsg = async function (id) {
  await deleteDoc(
    doc(db, "rooms", currentRoom, "messages", id)
  );
};
</script>

</body>
</html>
