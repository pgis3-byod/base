<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat V3</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: #fff;
}

#app {
  display: flex;
  height: 100vh;
}

#sidebar {
  width: 260px;
  background: #1c1c1c;
  padding: 10px;
  overflow-y: auto;
}

#chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  background: #222;
  margin: 6px 0;
  padding: 8px;
  border-radius: 6px;
}

input, button {
  margin: 5px;
  padding: 8px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <input id="name" placeholder="username">
  <button onclick="login()">Join</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div id="sidebar">
    <button onclick="openGlobal()">🌍 Global Chat</button>
    <button onclick="joinRoomPrompt()">+ Join Room</button>

    <hr>

    <div id="myRooms"></div>
  </div>

  <div id="chat">
    <div id="messages"></div>
    <input id="msg" placeholder="message">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  signInAnonymously
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* ---------------- CONFIG ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyAENHNbcpimSnAzIbwDXUtqBik3Vw5cFVU",
  authDomain: "pgis-3-chat.firebaseapp.com",
  projectId: "pgis-3-chat"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* ---------------- STATE ---------------- */
let user = null;
let username = "";
let currentRoom = "global";

/* ---------------- LOGIN PERSISTENCE ---------------- */
username = localStorage.getItem("username");

if (username) {
  document.getElementById("login")?.classList.add("hidden");
  document.getElementById("app")?.classList.remove("hidden");
}

/* ---------------- AUTH ---------------- */
signInAnonymously(auth).then(u => {
  user = u.user;
  if (username) openGlobal();
});

/* ---------------- LOGIN ---------------- */
window.login = async function () {
  username = document.getElementById("name").value.trim();
  if (!username) return;

  localStorage.setItem("username", username);

  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  openGlobal();
};

/* ---------------- GLOBAL CHAT ---------------- */
window.openGlobal = function () {
  currentRoom = "global";
  listenMessages();
};

/* ---------------- JOIN ROOM ---------------- */
window.joinRoomPrompt = async function () {

  const roomId = prompt("Room ID:");
  if (!roomId) return;

  const code = prompt("Invite code:");
  if (!code) return;

  const snap = await getDoc(doc(db, "rooms", roomId));
  if (!snap.exists()) return;

  const room = snap.data();

  if (room.inviteCode !== code) {
    alert("Wrong code");
    return;
  }

  await setDoc(doc(db, "rooms", roomId, "members", user.uid), {
    role: "user",
    joinedAt: Date.now()
  });

  addMyRoom(roomId, room.name);

  currentRoom = roomId;
  listenMessages();
};

/* ---------------- MY ROOMS (LOCAL ONLY) ---------------- */
function addMyRoom(id, name) {
  const el = document.createElement("div");
  el.innerHTML = `<button onclick="switchRoom('${id}')">${name}</button>`;
  document.getElementById("myRooms").appendChild(el);
}

window.switchRoom = function (roomId) {
  currentRoom = roomId;
  listenMessages();
};

/* ---------------- MESSAGES ---------------- */
function listenMessages() {
  const q = query(
    collection(db, "rooms", currentRoom, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, snap => {
    const box = document.getElementById("messages");
    box.innerHTML = "";

    snap.forEach(m => {
      const d = m.data();

      const el = document.createElement("div");
      el.className = "msg";

      el.textContent = `${d.username}: ${d.text}`;

      box.appendChild(el);
    });

  }, err => console.error(err));
}

/* ---------------- SEND ---------------- */
window.sendMessage = async function () {
  const text = document.getElementById("msg").value;
  if (!text.trim()) return;

  await addDoc(
    collection(db, "rooms", currentRoom, "messages"),
    {
      text,
      username,
      userId: user.uid,
      createdAt: Date.now()
    }
  );

  document.getElementById("msg").value = "";
};
</script>

</body>
</html>
